<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>式場評価アプリ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #B8975A;
  --gold-light: #D4BC8A;
  --gold-bg: #FAF6F0;
  --dark: #1C1A17;
  --gray: #888888;
  --light-gray: #F5F3EF;
  --white: #FFFFFF;
  --red: #C44D4D;
  --green: #4D8C57;
  --radius: 12px;
}

body {
  font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", Arial, sans-serif;
  background: var(--gold-bg);
  color: var(--dark);
  line-height: 1.6;
  min-height: 100dvh;
}

.screen { display: none; min-height: 100dvh; }
.screen.active { display: block; }

/* ===== TOP SCREEN ===== */
.top-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: 2rem 1.5rem;
  text-align: center;
}
.top-screen.active { display: flex; }

.top-label {
  font-size: 0.85rem;
  color: var(--gold);
  letter-spacing: 0.15em;
  margin-bottom: 0.3rem;
}
.top-title {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 0.5rem;
}
.top-sub {
  font-size: 0.8rem;
  color: var(--gray);
  margin-bottom: 2.5rem;
}
.top-divider {
  width: 60px;
  height: 2px;
  background: var(--gold);
  margin-bottom: 2.5rem;
}

.top-buttons { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 320px; }

.btn {
  display: block;
  width: 100%;
  padding: 1rem 1.5rem;
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--gold);
  color: var(--white);
}
.btn-primary:hover { background: #A6854E; }

.btn-secondary {
  background: var(--white);
  color: var(--dark);
  border: 2px solid #E0D5C5;
}
.btn-secondary:hover { border-color: var(--gold); }

.btn-result {
  background: var(--dark);
  color: var(--white);
  margin-top: 1rem;
}
.btn-result:hover { background: #333; }

.btn-sm {
  padding: 0.6rem 1.2rem;
  font-size: 0.85rem;
  width: auto;
}

.top-status {
  margin-top: 2rem;
  font-size: 0.78rem;
  color: var(--gray);
}
.top-status span { color: var(--gold); font-weight: 600; }

/* ===== EVAL SCREEN ===== */
.eval-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--white);
  border-bottom: 1px solid #E8E2D8;
  padding: 0.8rem 1rem;
}
.eval-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.6rem;
}
.eval-back {
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: var(--gold);
  padding: 0.2rem;
  font-family: inherit;
}
.eval-person-label {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--gold);
  background: var(--gold-bg);
  padding: 0.3rem 0.8rem;
  border-radius: 20px;
}
.eval-save-btn {
  background: var(--gold);
  color: var(--white);
  border: none;
  padding: 0.4rem 1rem;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}

.venue-tabs {
  display: flex;
  gap: 0.4rem;
  overflow-x: auto;
  padding-bottom: 0.3rem;
  -webkit-overflow-scrolling: touch;
}
.venue-tabs::-webkit-scrollbar { display: none; }

.venue-tab {
  flex-shrink: 0;
  background: var(--light-gray);
  border: none;
  padding: 0.4rem 0.8rem;
  border-radius: 20px;
  font-size: 0.72rem;
  cursor: pointer;
  color: var(--gray);
  font-weight: 500;
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
}
.venue-tab.active {
  background: var(--gold);
  color: var(--white);
  font-weight: 600;
}
.venue-tab.has-data {
  position: relative;
}
.venue-tab.has-data::after {
  content: "";
  position: absolute;
  top: 3px;
  right: 3px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
}

.eval-body { padding: 1rem; max-width: 600px; margin: 0 auto; }

.venue-info {
  text-align: center;
  margin-bottom: 1.2rem;
}
.venue-name {
  font-size: 1.2rem;
  font-weight: 700;
}
.venue-detail {
  font-size: 0.78rem;
  color: var(--gray);
}

.category {
  background: var(--white);
  border-radius: var(--radius);
  margin-bottom: 1rem;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.category-header {
  background: var(--gold-bg);
  padding: 0.7rem 1rem;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--gold);
  border-bottom: 1px solid #E8E2D8;
}
.category-items { padding: 0.5rem 0; }

.eval-item {
  padding: 0.6rem 1rem;
  border-bottom: 1px solid #F0ECE5;
}
.eval-item:last-child { border-bottom: none; }
.eval-item-label {
  font-size: 0.82rem;
  margin-bottom: 0.3rem;
  color: var(--dark);
}
.stars {
  display: flex;
  gap: 0.3rem;
}
.star {
  font-size: 1.5rem;
  cursor: pointer;
  color: #DDD;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.star.filled { color: var(--gold); }
.star:hover { color: var(--gold-light); }

.memo-section {
  margin-top: 1rem;
  background: var(--white);
  border-radius: var(--radius);
  padding: 1rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.memo-label {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--gray);
  margin-bottom: 0.4rem;
}
.memo-input {
  width: 100%;
  min-height: 80px;
  border: 1px solid #E0D5C5;
  border-radius: 8px;
  padding: 0.6rem;
  font-size: 0.85rem;
  font-family: inherit;
  resize: vertical;
  line-height: 1.5;
}
.memo-input:focus { outline: none; border-color: var(--gold); }

/* Photo section */
.photo-section {
  margin-top: 1rem;
  background: var(--white);
  border-radius: var(--radius);
  padding: 1rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.photo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.6rem;
}
.photo-label {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--gray);
}
.photo-add-btn {
  background: var(--gold);
  color: var(--white);
  border: none;
  padding: 0.3rem 0.8rem;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
}
.photo-thumb {
  aspect-ratio: 1;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
}
.photo-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.photo-thumb .photo-delete {
  position: absolute;
  top: 4px;
  right: 4px;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  font-size: 0.7rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.photo-uploading {
  aspect-ratio: 1;
  border-radius: 8px;
  background: var(--light-gray);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  color: var(--gray);
}
.photo-empty {
  text-align: center;
  padding: 1rem;
  color: var(--gray);
  font-size: 0.78rem;
}

/* Photo lightbox */
.lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.lightbox.active { display: flex; }
.lightbox img {
  max-width: 95%;
  max-height: 90vh;
  object-fit: contain;
  border-radius: 8px;
}
.lightbox-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: none;
  border: none;
  color: white;
  font-size: 2rem;
  cursor: pointer;
}

.save-toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--dark);
  color: var(--white);
  padding: 0.8rem 1.5rem;
  border-radius: 30px;
  font-size: 0.85rem;
  font-weight: 600;
  z-index: 999;
  transition: transform 0.3s ease;
  pointer-events: none;
}
.save-toast.show { transform: translateX(-50%) translateY(0); }

/* ===== RESULT SCREEN ===== */
.result-header {
  background: var(--white);
  border-bottom: 1px solid #E8E2D8;
  padding: 0.8rem 1rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  position: sticky;
  top: 0;
  z-index: 100;
}
.result-title {
  font-size: 1rem;
  font-weight: 700;
}

.result-body { padding: 1rem; max-width: 700px; margin: 0 auto; }

.result-empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--gray);
}

.ranking-section { margin-bottom: 2rem; }
.section-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--gold);
  border-bottom: 2px solid var(--gold);
  padding-bottom: 0.4rem;
  margin-bottom: 1rem;
}

.ranking-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 0.8rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  display: flex;
  align-items: center;
  gap: 1rem;
}
.ranking-card.rank-1 { border: 2px solid var(--gold); }

.rank-badge {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.9rem;
  flex-shrink: 0;
  background: var(--light-gray);
  color: var(--gray);
}
.rank-1 .rank-badge { background: var(--gold); color: var(--white); }
.rank-2 .rank-badge { background: #AAA; color: var(--white); }
.rank-3 .rank-badge { background: #C6956B; color: var(--white); }

.ranking-info { flex: 1; min-width: 0; }
.ranking-venue-name { font-weight: 700; font-size: 0.95rem; }
.ranking-venue-detail { font-size: 0.72rem; color: var(--gray); }

.ranking-scores {
  text-align: right;
  flex-shrink: 0;
}
.ranking-avg {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--gold);
}
.ranking-avg-label {
  font-size: 0.65rem;
  color: var(--gray);
}
.ranking-persons {
  display: flex;
  gap: 0.5rem;
  justify-content: flex-end;
  margin-top: 0.2rem;
  font-size: 0.7rem;
  color: var(--gray);
}

/* Detail comparison */
.detail-section { margin-bottom: 2rem; }

.detail-venue-card {
  background: var(--white);
  border-radius: var(--radius);
  margin-bottom: 1rem;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.detail-venue-header {
  padding: 0.8rem 1rem;
  border-bottom: 1px solid #E8E2D8;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.detail-venue-name { font-weight: 700; font-size: 0.95rem; }

.radar-container {
  padding: 1rem;
  display: flex;
  justify-content: center;
}
.radar-canvas { max-width: 400px; width: 100%; }

.detail-categories { padding: 0.5rem 1rem 1rem; }

.detail-cat-row {
  display: flex;
  align-items: center;
  padding: 0.5rem 0;
  border-bottom: 1px solid #F0ECE5;
  font-size: 0.8rem;
}
.detail-cat-row:last-child { border-bottom: none; }

.detail-cat-name {
  width: 100px;
  flex-shrink: 0;
  font-weight: 600;
  font-size: 0.75rem;
}
.detail-bars { flex: 1; }
.detail-bar-row {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 0.2rem;
}
.detail-bar-row:last-child { margin-bottom: 0; }
.detail-bar-who {
  font-size: 0.65rem;
  width: 28px;
  flex-shrink: 0;
  color: var(--gray);
}
.detail-bar-track {
  flex: 1;
  height: 14px;
  background: var(--light-gray);
  border-radius: 7px;
  overflow: hidden;
}
.detail-bar-fill {
  height: 100%;
  border-radius: 7px;
  transition: width 0.5s ease;
}
.detail-bar-fill.person-a { background: var(--gold); }
.detail-bar-fill.person-b { background: #7BA4C4; }
.detail-bar-score {
  font-size: 0.7rem;
  font-weight: 600;
  width: 20px;
  text-align: right;
}

.diff-highlight {
  background: #FFF3E0;
  border-left: 3px solid #FF9800;
  padding: 0.3rem 0.6rem;
  margin-top: 0.3rem;
  border-radius: 0 6px 6px 0;
  font-size: 0.7rem;
  color: #E65100;
}

.legend {
  display: flex;
  gap: 1.2rem;
  justify-content: center;
  margin-bottom: 1rem;
  font-size: 0.78rem;
}
.legend-item { display: flex; align-items: center; gap: 0.3rem; }
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.legend-dot.a { background: var(--gold); }
.legend-dot.b { background: #7BA4C4; }

.cat-filter-tabs {
  display: flex;
  gap: 0.4rem;
  overflow-x: auto;
  margin-bottom: 1rem;
  padding-bottom: 0.3rem;
  -webkit-overflow-scrolling: touch;
}
.cat-filter-tabs::-webkit-scrollbar { display: none; }
.cat-filter-tab {
  flex-shrink: 0;
  background: var(--light-gray);
  border: none;
  padding: 0.45rem 0.9rem;
  border-radius: 20px;
  font-size: 0.78rem;
  cursor: pointer;
  color: var(--gray);
  font-weight: 500;
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
}
.cat-filter-tab.active {
  background: var(--gold);
  color: var(--white);
  font-weight: 600;
}

.cat-venue-row {
  background: var(--white);
  border-radius: var(--radius);
  padding: 0.8rem 1rem;
  margin-bottom: 0.6rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.cat-venue-row.rank-1 { border: 2px solid var(--gold); }
.cat-venue-row-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.5rem;
}
.cat-venue-row-rank {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.cat-venue-row-name { font-weight: 700; font-size: 0.9rem; }
.cat-venue-row-avg {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gold);
}

/* Photo gallery in results */
.detail-photos {
  padding: 0.5rem 1rem 1rem;
}
.detail-photos-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.4rem;
}
.detail-photos-grid img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 6px;
  cursor: pointer;
}

.reset-section {
  text-align: center;
  margin-top: 2rem;
  padding: 1rem;
}
.btn-reset {
  background: none;
  border: 1px solid #DDD;
  color: var(--gray);
  padding: 0.5rem 1.2rem;
  border-radius: 20px;
  font-size: 0.75rem;
  cursor: pointer;
  font-family: inherit;
}

.sync-status {
  font-size: 0.7rem;
  color: var(--gray);
  text-align: center;
  margin-top: 0.5rem;
}

@media (min-width: 600px) {
  .top-title { font-size: 2rem; }
  .top-buttons { max-width: 380px; }
  .eval-body, .result-body { padding: 1.5rem; }
}
</style>
</head>
<body>

<!-- TOAST -->
<div class="save-toast" id="toast">保存しました</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">&times;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- ===== TOP SCREEN ===== -->
<div class="screen top-screen active" id="screen-top">
  <div class="top-label">BRIDAL FAIR</div>
  <div class="top-title">式場評価アプリ</div>
  <div class="top-sub">二人の評価でベストな式場を見つけよう</div>
  <div class="top-divider"></div>
  <div class="top-buttons">
    <button class="btn btn-primary" onclick="startEval('大悟')">大悟の評価を入力</button>
    <button class="btn btn-secondary" onclick="startEval('柚季')">柚季の評価を入力</button>
    <button class="btn btn-result" onclick="showResult()">結果を見る</button>
  </div>
  <div class="top-status" id="top-status"></div>
  <div class="sync-status" id="sync-status"></div>
</div>

<!-- ===== EVAL SCREEN ===== -->
<div class="screen" id="screen-eval">
  <div class="eval-header">
    <div class="eval-header-top">
      <button class="eval-back" onclick="goTop()">&larr;</button>
      <div class="eval-person-label" id="eval-person-label"></div>
      <button class="eval-save-btn" onclick="saveEval()">保存</button>
    </div>
    <div class="venue-tabs" id="venue-tabs"></div>
  </div>
  <div class="eval-body" id="eval-body"></div>
  <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)">
</div>

<!-- ===== RESULT SCREEN ===== -->
<div class="screen" id="screen-result">
  <div class="result-header">
    <button class="eval-back" onclick="goTop()">&larr;</button>
    <div class="result-title">評価結果</div>
  </div>
  <div class="result-body" id="result-body"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script>
// ===== FIREBASE INIT =====
const firebaseConfig = {

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// ===== DATA =====
const VENUES = [

  { id: "palace-hotel", name: "パレスホテル東京", type: "ホテル", area: "東京駅・丸の内" },
  { id: "happo-en", name: "八芳園", type: "庭園式場", area: "白金台" },
  { id: "new-otani", name: "ホテルニューオータニ", type: "ホテル", area: "赤坂・麹町" },
  { id: "grand-hyatt", name: "グランドハイアット東京", type: "ホテル", area: "六本木" },
  { id: "andaz", name: "アンダーズ東京", type: "ホテル", area: "虎ノ門ヒルズ" },

const CATEGORIES = [
  {
    id: "venue", name: "会場・空間",
    items: [
      { id: "chapel", label: "チャペル・挙式会場（光、広さ、荘厳さ）" },
      { id: "banquet", label: "披露宴会場（内装、広さ、雰囲気）" },
      { id: "lobby", label: "ロビー・外観の雰囲気" },
      { id: "view", label: "眺め・景観（夜景、庭、景色）" },
      { id: "access", label: "交通の便利さ・立地" },
    ]
  },
  {
    id: "food", name: "お料理・試食",
    items: [
      { id: "taste", label: "味・クオリティ" },
      { id: "presentation", label: "見た目・盛り付け" },
      { id: "volume", label: "量・満足感" },
    ]
  },
  {
    id: "staff", name: "スタッフの対応",

let currentPerson = null;

// ===== FIRESTORE HELPERS =====
function docId(person, venueId) {
  return `${person}_${venueId}`;
}

async function loadEval(person, venueId) {
  const key = docId(person, venueId);
  if (evalCache[key] !== undefined) return evalCache[key];
  try {
    const doc = await db.collection('evaluations').doc(key).get();
    const data = doc.exists ? doc.data() : null;
    evalCache[key] = data;
    return data;
  } catch (e) {
    console.error('Load error:', e);
    return null;
  }
}

async function saveEvalData(person, venueId, data) {
  const key = docId(person, venueId);
  evalCache[key] = data;
  try {
    await db.collection('evaluations').doc(key).set(data, { merge: true });
  } catch (e) {
    console.error('Save error:', e);
    showToast('保存エラー');
  }
}

async function loadAllData() {
  try {
    const snapshot = await db.collection('evaluations').get();
    snapshot.forEach(doc => {
      evalCache[doc.id] = doc.data();
    });
    document.getElementById('sync-status').textContent = 'クラウド同期済み';
  } catch (e) {
    console.error('Sync error:', e);
    document.getElementById('sync-status').textContent = '同期エラー';
  }
}

function getCachedEval(person, venueId) {
  return evalCache[docId(person, venueId)] || null;
}

function hasAnyData(person) {
  return VENUES.some(v => getCachedEval(person, v.id) !== null);
}

function getVenueScore(person, venueId) {
  const data = getCachedEval(person, venueId);
  if (!data || !data.ratings) return null;
  const vals = Object.values(data.ratings).filter(v => v > 0);
  return vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
}

function getCategoryAvg(person, venueId, catId) {
  const data = getCachedEval(person, venueId);
  if (!data || !data.ratings) return null;
  const cat = CATEGORIES.find(c => c.id === catId);
  const vals = cat.items.map(it => data.ratings[it.id] || 0).filter(v => v > 0);
  return vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
}

// ===== PHOTO HELPERS =====
async function uploadPhoto(person, venueId, file) {
  const ts = Date.now();
  const path = `photos/${person}/${venueId}/${ts}_${file.name}`;
  const ref = storage.ref(path);
  const compressed = await compressImage(file, 1200, 0.7);
  await ref.put(compressed);
  const url = await ref.getDownloadURL();
  return { url, path };
}

function compressImage(file, maxSize, quality) {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = h * maxSize / w; w = maxSize; }
        else { w = w * maxSize / h; h = maxSize; }
      }
      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(resolve, 'image/jpeg', quality);
    };
    img.src = URL.createObjectURL(file);
  });
}

async function deletePhoto(person, venueId, photoIdx) {
  const data = getCachedEval(person, venueId);
  if (!data || !data.photos || !data.photos[photoIdx]) return;
  const photo = data.photos[photoIdx];
  try {
    await storage.ref(photo.path).delete();
  } catch (e) { console.error('Delete storage error:', e); }
  data.photos.splice(photoIdx, 1);
  await saveEvalData(person, venueId, data);
}

function setRating(itemId, val) {
  const container = document.querySelector(`.stars[data-item="${itemId}"]`);
  container.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('filled', parseInt(s.dataset.val) <= val);
  });
}

async function collectCurrentRatings() {
  const venue = VENUES[currentVenueIdx];
  const ratings = {};
  let hasAny = false;

  document.querySelectorAll('.stars').forEach(container => {
    const itemId = container.dataset.item;
    const filled = container.querySelectorAll('.star.filled').length;
    ratings[itemId] = filled;
    if (filled > 0) hasAny = true;
  });

  const memoEl = document.getElementById('memo-input');
  const memo = memoEl ? memoEl.value.trim() : '';
  const existing = getCachedEval(currentPerson, venue.id);
  const photos = existing ? (existing.photos || []) : [];

  if (hasAny || memo || photos.length > 0) {
    await saveEvalData(currentPerson, venue.id, { ratings, memo, photos });
  }
}

}

  const venue = VENUES[currentVenueIdx];
  showToast('アップロード中...');

  try {
    const photo = await uploadPhoto(currentPerson, venue.id, file);

// ===== RADAR CHART (pure canvas) =====
function drawRadar(venueId) {
  const canvas = document.getElementById(`radar-${venueId}`);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const size = 400;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(dpr, dpr);

  const cx = size / 2;
  const cy = size / 2;
  const maxR = 105;
  const labels = CATEGORIES.map(c => c.name);
  const n = labels.length;
  const angleStep = (Math.PI * 2) / n;
  const startAngle = -Math.PI / 2;

  // Grid
  ctx.strokeStyle = '#E0D5C5';
  ctx.lineWidth = 0.5;
  for (let ring = 1; ring <= 5; ring++) {
    const r = (ring / 5) * maxR;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const a = startAngle + i * angleStep;
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = '#D0C8BC';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < n; i++) {
    const a = startAngle + i * angleStep;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + maxR * Math.cos(a), cy + maxR * Math.sin(a));
    ctx.stroke();
  }

  // Labels (all 2-line, center-aligned)
  ctx.fillStyle = '#555';
  ctx.font = '10px "Hiragino Sans", Arial, sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  for (let i = 0; i < n; i++) {
    const a = startAngle + i * angleStep;
    const lr = maxR + 30;
    const lx = cx + lr * Math.cos(a);
    const ly = cy + lr * Math.sin(a);
    const label = labels[i];
    const mid = label.indexOf('・');
    const line1 = mid > 0 ? label.substring(0, mid) : label;
    const line2 = mid > 0 ? label.substring(mid + 1) : '';
    ctx.fillText(line1, lx, ly - 7);
    if (line2) ctx.fillText(line2, lx, ly + 7);
  }

  function drawData(person, color, alpha) {
    const vals = CATEGORIES.map(c => getCategoryAvg(person, venueId, c.id) || 0);
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const idx = i % n;
      const a = startAngle + idx * angleStep;
      const r = (vals[idx] / 5) * maxR;
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.fillStyle = color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Dots
    for (let i = 0; i < n; i++) {
      const a = startAngle + i * angleStep;
      const r = (vals[i] / 5) * maxR;
      ctx.beginPath();
      ctx.arc(cx + r * Math.cos(a), cy + r * Math.sin(a), 3, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }
  }

  if (hasAnyData('大悟')) drawData('大悟', 'rgb(184, 151, 90)', 0.15);
  if (hasAnyData('柚季')) drawData('柚季', 'rgb(123, 164, 196)', 0.15);
}

  } catch (e) {
    console.error('Reset error:', e);
    showToast('削除エラー');
  }
}
